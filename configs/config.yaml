model:
  name: "khedim/Medical-Prescription-OCR"
  max_length: 128

training:
  epochs: 30
  batch_size: 8
  learning_rate: 5e-5
  weight_decay: 0.01
  warmup_steps: 500
  grad_clip: 1.0
  val_interval: 1
  checkpoint_dir: "checkpoints/"

data:
  image_size: [384, 384]
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  hf_dataset: "chinmays18/medical-prescription-dataset"

inference:
  beam_size: 2
  device: "auto"

detection:
  min_line_height: 15
  preprocess_for_lines: true
